version: '3'

tasks:
  build:
    desc: Build core packages
    cmds:
      - task: build:workspace-daemon
      - task: build:workspace-sdk

  build:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go build ./...

  test:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go test ./...

  build:workspace-sdk:
    dir: packages/sdk/js
    cmds:
      - pnpm install
      - pnpm build

  test:
    desc: Run core tests
    cmds:
      - task: test:workspace-daemon
      - task: test:workspace-sdk

  test:workspace-sdk:
    dir: packages/sdk/js
    cmds:
      - pnpm test

  lint:
    desc: Run core lint checks
    cmds:
      - task: lint:workspace-daemon
      - task: lint:workspace-sdk

  lint:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go test ./... -run TestDoesNotExist

  lint:workspace-sdk:
    dir: packages/sdk/js
    cmds:
      - pnpm exec tsc --noEmit

  ci:
    desc: Run CI pipeline - install, build, lint, test
    cmds:
      - pnpm install
      - task: build
      - task: lint
      - task: test

  clean:
    desc: Clean core build artifacts
    cmds:
      - rm -rf packages/nexus/nexus
      - rm -rf packages/sdk/js/dist
