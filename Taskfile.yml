version: '3'

# ---------------------------------------------------------------------------
# Nexus development task runner
# Usage:  task <target>
#
# Quick start:
#   task app:open      – embed local daemon, (optional) download tools, xcodebuild, open app
#   task dev           – restart standalone nexus-daemon (CLI), then app:open
#   task test:terminal – run terminal XCUITests (daemon must be running)
#   task test          – run all XCUITests
#
# Embedded daemon: always from `swift:bundle-daemon` (this repo’s Go build).
# Release downloads (`swift:bundle-tools`) run only when NEXUS_BUNDLE_TOOLS=1 so local
# iteration does not hit GitHub on every build. Tools fall back to PATH at runtime.
# ---------------------------------------------------------------------------

vars:
  NEXUS_DIR: packages/nexus
  SWIFT_DIR: packages/nexus-swift
  DAEMON_BIN: packages/nexus/nexus-daemon
  # Keep DerivedData inside the repo so paths are stable
  DERIVED: packages/nexus-swift/.build/xcbuild
  APP_BUNDLE: packages/nexus-swift/.build/xcbuild/Build/Products/Debug/NexusApp.app
  XCPRETTY: "{{.HOME}}/.gem/ruby/2.6.0/bin/xcpretty"
  XCODEBUILD_COMMON: >-
    -project packages/nexus-swift/NexusApp.xcodeproj
    -scheme NexusApp
    -destination 'platform=macOS'
    -configuration Debug
    -derivedDataPath packages/nexus-swift/.build/xcbuild

tasks:

  # ── daemon ────────────────────────────────────────────────────────────────

  daemon:build:
    desc: Compile the Go nexus-daemon binary
    dir: "{{.NEXUS_DIR}}"
    sources:
      - "**/*.go"
    generates:
      - nexus-daemon
    cmds:
      - go build -o ./nexus-daemon ./cmd/daemon

  swift:bundle-daemon:
    desc: Build the Go daemon (with version ldflags) and copy it into the app's Resources folder
    dir: "{{.NEXUS_DIR}}"
    cmds:
      - |
        go build \
          -ldflags "-X github.com/inizio/nexus/packages/nexus/pkg/buildinfo.DaemonVersion=dev-local \
                    -X github.com/inizio/nexus/packages/nexus/pkg/buildinfo.Commit=$(git rev-parse --short HEAD 2>/dev/null || echo unknown) \
                    -X github.com/inizio/nexus/packages/nexus/pkg/buildinfo.BuiltAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          -o ../nexus-swift/Resources/nexus-daemon \
          ./cmd/daemon/
      - chmod +x ../nexus-swift/Resources/nexus-daemon
      - echo "Bundled daemon → packages/nexus-swift/Resources/nexus-daemon"

  swift:bundle-tools:
    desc: Download and stage fallback tool binaries into packages/nexus-swift/Resources/tools
    dir: "{{.NEXUS_DIR}}"
    cmds:
      - |
        set -euo pipefail
        TOOLS_DIR="../nexus-swift/Resources/tools"
        mkdir -p "$TOOLS_DIR"

        HOST_OS="$(uname -s)"
        HOST_ARCH="$(uname -m)"
        case "$HOST_OS" in
          Darwin) NEXUS_OS="darwin"; LIMA_OS="Darwin" ;;
          Linux) NEXUS_OS="linux"; LIMA_OS="Linux" ;;
          *) echo "unsupported host OS: $HOST_OS" >&2; exit 1 ;;
        esac
        case "$HOST_ARCH" in
          arm64|aarch64) NEXUS_ARCH="arm64"; MUTAGEN_ARCH="arm64" ;;
          x86_64|amd64) NEXUS_ARCH="amd64"; MUTAGEN_ARCH="amd64" ;;
          *) echo "unsupported host arch: $HOST_ARCH" >&2; exit 1 ;;
        esac
        if [ "$LIMA_OS" = "Darwin" ]; then
          if [ "$HOST_ARCH" = "x86_64" ] || [ "$HOST_ARCH" = "amd64" ]; then
            LIMA_ARCH="x86_64"
          else
            LIMA_ARCH="arm64"
          fi
        else
          if [ "$HOST_ARCH" = "x86_64" ] || [ "$HOST_ARCH" = "amd64" ]; then
            LIMA_ARCH="x86_64"
          else
            LIMA_ARCH="aarch64"
          fi
        fi

        NEXUS_TAG="${NEXUS_BUNDLE_TAG:-latest}"
        MUTAGEN_TAG="${MUTAGEN_BUNDLE_TAG:-latest}"
        LIMA_TAG="${LIMA_BUNDLE_TAG:-latest}"
        TMP="$(mktemp -d)"
        cleanup() { rm -rf "$TMP"; }
        trap cleanup EXIT

        download_release_asset() {
          repo="$1"
          tag="$2"
          shift 2
          if [ "$tag" = "latest" ]; then
            gh release download -R "$repo" "$@" -D "$TMP"
          else
            gh release download "$tag" -R "$repo" "$@" -D "$TMP"
          fi
        }

        echo "Downloading nexus + nexus-daemon ($NEXUS_OS/$NEXUS_ARCH) from IniZio/nexus@$NEXUS_TAG…"
        download_release_asset "IniZio/nexus" "$NEXUS_TAG" -p "nexus-${NEXUS_OS}-${NEXUS_ARCH}" -p "nexus-daemon-${NEXUS_OS}-${NEXUS_ARCH}"
        rm -f "$TOOLS_DIR/nexus" "$TOOLS_DIR/nexus-daemon"
        cp "$TMP/nexus-${NEXUS_OS}-${NEXUS_ARCH}" "$TOOLS_DIR/nexus"
        cp "$TMP/nexus-daemon-${NEXUS_OS}-${NEXUS_ARCH}" "$TOOLS_DIR/nexus-daemon"

        echo "Downloading mutagen ($NEXUS_OS/$MUTAGEN_ARCH) from mutagen-io/mutagen@$MUTAGEN_TAG…"
        download_release_asset "mutagen-io/mutagen" "$MUTAGEN_TAG" -p "mutagen_${NEXUS_OS}_${MUTAGEN_ARCH}_*.tar.gz"
        set -- "$TMP"/mutagen_${NEXUS_OS}_${MUTAGEN_ARCH}_*.tar.gz
        MUTAGEN_TAR="$1"
        [ -f "$MUTAGEN_TAR" ] || { echo "mutagen archive not found after download" >&2; exit 1; }
        MUTAGEN_ENTRY="$(tar -tzf "$MUTAGEN_TAR" | awk '/(^|\/)mutagen$/ {print; exit}')"
        [ -n "$MUTAGEN_ENTRY" ] || { echo "mutagen binary entry not found in archive" >&2; exit 1; }
        tar -xzf "$MUTAGEN_TAR" -C "$TMP" "$MUTAGEN_ENTRY"
        rm -f "$TOOLS_DIR/mutagen"
        cp "$TMP/$MUTAGEN_ENTRY" "$TOOLS_DIR/mutagen"

        echo "Downloading limactl ($LIMA_OS/$LIMA_ARCH) from lima-vm/lima@$LIMA_TAG…"
        download_release_asset "lima-vm/lima" "$LIMA_TAG" -p "lima-*-${LIMA_OS}-${LIMA_ARCH}.tar.gz"
        set -- "$TMP"/lima-*-${LIMA_OS}-${LIMA_ARCH}.tar.gz
        LIMA_TAR="$1"
        [ -f "$LIMA_TAR" ] || { echo "lima archive not found after download" >&2; exit 1; }
        LIMA_ENTRY="$(tar -tzf "$LIMA_TAR" | awk '/(^|\/)bin\/limactl$/ {print; exit}')"
        [ -n "$LIMA_ENTRY" ] || { echo "limactl entry not found in archive" >&2; exit 1; }
        tar -xzf "$LIMA_TAR" -C "$TMP" "$LIMA_ENTRY"
        rm -f "$TOOLS_DIR/limactl"
        cp "$TMP/$LIMA_ENTRY" "$TOOLS_DIR/limactl"

        # tmux doesn't ship portable upstream binaries; keep PATH fallback for now.
        if command -v tmux >/dev/null 2>&1; then
          rm -f "$TOOLS_DIR/tmux"
          cp "$(command -v tmux)" "$TOOLS_DIR/tmux"
        else
          rm -f "$TOOLS_DIR/tmux"
          echo "warning: tmux not found in PATH; tmux fallback binary not bundled"
        fi

        chmod +x "$TOOLS_DIR/nexus" "$TOOLS_DIR/nexus-daemon" "$TOOLS_DIR/mutagen" "$TOOLS_DIR/limactl"
        if [ -f "$TOOLS_DIR/tmux" ]; then chmod +x "$TOOLS_DIR/tmux"; fi

        echo "Bundled fallback tools ready in packages/nexus-swift/Resources/tools/"

  swift:prepare-resources:
    desc: Embed locally built daemon; download Resources/tools only when NEXUS_BUNDLE_TOOLS=1
    cmds:
      - |
        set -euo pipefail
        if [ "${NEXUS_BUNDLE_TOOLS:-}" = "1" ]; then
          task swift:bundle-tools
        else
          echo "Skipping swift:bundle-tools (set NEXUS_BUNDLE_TOOLS=1 to download lima/mutagen release fallbacks)"
          mkdir -p packages/nexus-swift/Resources/tools
        fi
      - task: swift:bundle-daemon

  app:codesign:
    desc: Ad-hoc sign embedded daemon and app (after manual binary swap without xcodebuild)
    cmds:
      - |
        APP="{{.APP_BUNDLE}}"
        if [ ! -d "$APP" ]; then
          echo "app bundle not found: $APP (run task swift:build first)" >&2
          exit 1
        fi
        codesign --force --sign - "$APP/Contents/Resources/nexus-daemon"
        codesign --force --deep --sign - "$APP"
        echo "codesign ok → $APP"

  daemon:restart:
    desc: Kill any running daemon, start a fresh one, wait for /healthz
    deps: [daemon:build]
    dir: "{{.NEXUS_DIR}}"
    cmds:
      # Kill existing daemon (SIGTERM first, then SIGKILL if port still held)
      - pkill -f nexus-daemon 2>/dev/null || true
      - |
        for port in 63987 63997; do
          for i in $(seq 1 8); do
            if ! lsof -i :$port -sTCP:LISTEN >/dev/null 2>&1; then break; fi
            if [ "$i" = "4" ]; then pkill -9 -f nexus-daemon 2>/dev/null || true; fi
            sleep 0.5
          done
        done
      - |
        RUN_DIR="${XDG_CONFIG_HOME:-$HOME/.config}/nexus/run"
        mkdir -p "$RUN_DIR"
        rm -f "$RUN_DIR"/daemon.pid "$RUN_DIR"/daemon-*.pid
        : > "$RUN_DIR/daemon.log"
      - |
        PORT="${NEXUS_DAEMON_PORT:-63987}"
        TOKEN="${NEXUS_DAEMON_TOKEN:-}"
        RUN_DIR="${XDG_CONFIG_HOME:-$HOME/.config}/nexus/run"
        LOG_PATH="$RUN_DIR/daemon.log"
        if [ -z "$TOKEN" ]; then
          TOKEN="$(security find-generic-password -s "${NEXUS_DAEMON_TOKEN_KEYCHAIN_SERVICE:-nexus-daemon-token}" -w 2>/dev/null || true)"
        fi
        if [ -n "$TOKEN" ]; then
          ./nexus-daemon --port "$PORT" --token "$TOKEN" >> "$LOG_PATH" 2>&1 &
        else
          ./nexus-daemon --port "$PORT" >> "$LOG_PATH" 2>&1 &
        fi
      - |
        PORT="${NEXUS_DAEMON_PORT:-63987}"
        echo -n "Waiting for daemon on :$PORT..."
        for i in $(seq 1 30); do
          if curl -sf "http://localhost:$PORT/healthz" >/dev/null 2>&1; then
            echo " ready on :$PORT"
            exit 0
          fi
          sleep 0.5
          echo -n "."
        done
        echo ""
        echo "Daemon did not become healthy in 15 s" >&2
        exit 1

  daemon:logs:
    desc: Tail the running daemon log
    cmds:
      - tail -f ~/.config/nexus/run/daemon.log

  app:logs:
    desc: Stream NexusApp + daemon logs from unified logger
    cmds:
      - log stream --style compact --predicate 'process == "NexusApp" OR process == "nexus-daemon"'

  app:diag:
    desc: Quick connectivity diagnostics for Nexus app + daemon
    cmds:
      - |
        set -e
        echo "== daemon health =="
        for port in 63987 63997; do
          code="$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${port}/healthz" || true)"
          echo "port ${port}: HTTP ${code:-000}"
        done
        echo ""
        echo "== listening sockets =="
        lsof -nP -iTCP -sTCP:LISTEN | rg 'nexus-daemon|63987|63997' || true
        echo ""
        echo "== recent daemon log =="
        LOG_PATH="${XDG_CONFIG_HOME:-$HOME/.config}/nexus/run/daemon.log"
        if [ ! -f "$LOG_PATH" ]; then
          echo "(daemon log missing)"
        else
          awk -v max=40 '
            { buf[NR % max] = $0 }
            END {
              start = (NR > max) ? (NR - max + 1) : 1
              for (i = start; i <= NR; i++) {
                printf "%d:%s\n", i, buf[i % max]
              }
            }
          ' "$LOG_PATH"
        fi
        echo ""
        echo "== token checks =="
        if security find-generic-password -s "${NEXUS_DAEMON_TOKEN_KEYCHAIN_SERVICE:-nexus-daemon-token}" -w >/dev/null 2>&1; then
          echo "keychain token (${NEXUS_DAEMON_TOKEN_KEYCHAIN_SERVICE:-nexus-daemon-token}): present"
        else
          echo "keychain token (${NEXUS_DAEMON_TOKEN_KEYCHAIN_SERVICE:-nexus-daemon-token}): missing"
        fi

  # ── swift / xcode ─────────────────────────────────────────────────────────

  swift:build:
    desc: Build NexusApp.app via xcodebuild (Debug, macOS)
    deps: [swift:prepare-resources]
    generates:
      - "{{.APP_BUNDLE}}/Contents/MacOS/NexusApp"
    cmds:
      - |
        xcodebuild {{.XCODEBUILD_COMMON}} build \
          2>&1 | {{.XCPRETTY}} --color || true

  swift:regen:
    desc: Regenerate NexusApp.xcodeproj from project.yml (run after editing project.yml)
    dir: "{{.SWIFT_DIR}}"
    cmds:
      - xcodegen generate

  # ── app ───────────────────────────────────────────────────────────────────

  app:open:
    desc: Launch the built NexusApp.app for eyeball testing
    deps: [swift:build]
    cmds:
      - open {{.APP_BUNDLE}}

  app:kill:
    desc: Quit the running NexusApp
    cmds:
      - osascript -e 'tell app "NexusApp" to quit' 2>/dev/null || pkill -f NexusApp || true

  # ── combined dev flow ─────────────────────────────────────────────────────

  dev:
    desc: "Build everything, restart daemon, open app for eyeball check"
    cmds:
      - task: daemon:restart
      - task: app:open

  # ── tests ─────────────────────────────────────────────────────────────────

  test:terminal:
    desc: Run NexusTerminalUITests (requires running daemon + Accessibility permission)
    cmds:
      - |
        echo "Running terminal UI tests..."
        xcodebuild test {{.XCODEBUILD_COMMON}} \
          -only-testing NexusUITests/NexusTerminalUITests \
          2>&1 | {{.XCPRETTY}} --test --color
      - echo "Done. Check above for passed/failed counts."

  test:smoke:
    desc: Run quick smoke tests (launch, connect, connection status)
    cmds:
      - |
        xcodebuild test {{.XCODEBUILD_COMMON}} \
          -only-testing NexusUITests/NexusUITests/testAppLaunches \
          -only-testing NexusUITests/NexusUITests/testConnectsOrShowsStartup \
          -only-testing NexusUITests/NexusUITests/testConnectionStatusIndicatorAppears \
          2>&1 | {{.XCPRETTY}} --test --color

  test:
    desc: Run all XCUITests
    cmds:
      - |
        xcodebuild test {{.XCODEBUILD_COMMON}} \
          -only-testing NexusUITests \
          2>&1 | {{.XCPRETTY}} --test --color

  test:unit:
    desc: Run NexusAppTests (unit tests, no UI)
    cmds:
      - |
        xcodebuild test {{.XCODEBUILD_COMMON}} \
          -only-testing NexusAppTests \
          2>&1 | {{.XCPRETTY}} --test --color

  # ── Build ────────────────────────────────────────────────────────────────

  build:
    desc: Build core packages
    cmds:
      - task: build:workspace-daemon
      - task: build:workspace-sdk
      - task: build:nexus-ui

  build:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go build ./...

  build:workspace-sdk:
    dir: packages/sdk/js
    cmds:
      - pnpm install
      - pnpm build

  build:nexus-ui:
    desc: "Build UI and copy clean dist into Go embed directory"
    dir: packages/nexus-ui
    cmds:
      - pnpm install
      - pnpm build
      - bash -c 'rm -rf ../nexus/pkg/server/portal/ui_dist && mkdir -p ../nexus/pkg/server/portal/ui_dist && cp -r dist/. ../nexus/pkg/server/portal/ui_dist/'

  # ── Test ─────────────────────────────────────────────────────────────────

  test:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go test ./...

  test:workspace-sdk:
    dir: packages/sdk/js
    cmds:
      - pnpm test

  test:nexus-ui:
    dir: packages/nexus-ui
    cmds:
      - pnpm check

  # ── Lint ─────────────────────────────────────────────────────────────────

  lint:
    desc: Run core lint checks
    cmds:
      - task: lint:workspace-daemon
      - task: lint:workspace-sdk

  lint:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go test ./... -run TestDoesNotExist

  lint:workspace-sdk:
    dir: packages/sdk/js
    cmds:
      - pnpm exec tsc --noEmit

  # ── CI ───────────────────────────────────────────────────────────────────

  ci:
    desc: Run local equivalent of CI jobs
    cmds:
      - task: ci:go-fix
      - task: ci:coverage
      - task: ci:core
      - task: ci:flows-e2e

  ci:core:
    desc: Run Core CI (linux) equivalent
    cmds:
      - ./scripts/ci/nexus-core.sh

  ci:go-fix:
    desc: Run Go Fix Check equivalent
    cmds:
      - ./scripts/ci/go-fix.sh

  ci:coverage:
    desc: Run Go Coverage (nexus) equivalent
    cmds:
      - ./scripts/ci/coverage.sh

  ci:flows-e2e:
    desc: Run runtime backend selection E2E package (strict when CI=true; set NEXUS_E2E_STRICT_RUNTIME=0 to allow soft skips locally)
    env:
      CI: true
    cmds:
      - bash -lc 'set -euo pipefail; if [[ -e /dev/kvm ]]; then sudo chmod 666 /dev/kvm || true; fi'
      - ./scripts/ci/flows-e2e-setup.sh
      - bash -lc 'set -euo pipefail; set -a; source "$(git rev-parse --show-toplevel)/.nexus-e2e-env.sh"; set +a; pnpm --filter @nexus/e2e-flows test:ci -- src/cases/runtime/runtime-selection.e2e.test.ts'

  # ── housekeeping ──────────────────────────────────────────────────────────

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf packages/nexus-swift/.build
      - rm -f packages/nexus/nexus-daemon
      - echo "Clean done."
