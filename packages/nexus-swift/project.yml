name: NexusApp

options:
  bundleIdPrefix: com.nexus
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: strict
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_TESTABILITY: YES
    # Allow callers (CI/local scripts) to override app bundle IDs.
    NEXUS_APP_BUNDLE_ID: com.nexus.NexusApp
    NEXUS_APP_TEST_BUNDLE_ID: com.nexus.NexusAppTests
    NEXUS_UI_TEST_BUNDLE_ID: com.nexus.NexusUITests
    MTL_ENABLE_DEBUG_INFO: NO
    # Skip Metal shader compilation (not used in this app)
    GCC_WARN_INHIBIT_ALL_WARNINGS: NO
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES

targets:

  # ── NexusCore static library ──────────────────────────────────────────────
  NexusCore:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/NexusCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexus.NexusCore

  # ── NexusApp application ─────────────────────────────────────────────────
  NexusApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/NexusApp
    postCompileScripts:
      - name: Copy bundled tools to app Resources
        inputFiles:
          - $(SRCROOT)/Resources/nexus-daemon
          - $(SRCROOT)/Resources/tools/nexus
          - $(SRCROOT)/Resources/tools/nexus-daemon
          - $(SRCROOT)/Resources/tools/mutagen
          - $(SRCROOT)/Resources/tools/limactl
          - $(SRCROOT)/Resources/tools/tmux
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/nexus-daemon
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/tools/nexus
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/tools/nexus-daemon
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/tools/mutagen
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/tools/limactl
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/tools/tmux
        script: |
          copy_tool() {
            local src="$1"
            local dst="$2"
            local label="$3"
            if [ -f "$src" ]; then
              mkdir -p "$(dirname "$dst")"
              cp "$src" "$dst"
              chmod +x "$dst"
              echo "Bundled ${label} -> ${dst}"
            else
              echo "warning: ${label} not found at ${src}; run 'task swift:prepare-resources' to stage Resources"
            fi
          }

          copy_tool "${SRCROOT}/Resources/nexus-daemon" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/nexus-daemon" "nexus-daemon"

          for tool in nexus nexus-daemon mutagen limactl tmux; do
            copy_tool "${SRCROOT}/Resources/tools/${tool}" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/tools/${tool}" "${tool}"
          done
    dependencies:
      - target: NexusCore
        link: true
      - package: SwiftTerm
        product: SwiftTerm
    info:
      path: Sources/NexusApp/Info.plist
      properties:
        CFBundleDisplayName: Nexus
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(NEXUS_APP_BUNDLE_ID)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES

  # ── NexusAppTests (unit / integration) ───────────────────────────────────
  NexusAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/NexusAppTests
    dependencies:
      - target: NexusCore
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(NEXUS_APP_TEST_BUNDLE_ID)
        GENERATE_INFOPLIST_FILE: YES

  # ── NexusUITests (XCUITest — use Xcode's Record button) ──────────────────
  NexusUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/NexusUITests
    dependencies:
      - target: NexusApp
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(NEXUS_UI_TEST_BUNDLE_ID)
        TEST_TARGET_NAME: NexusApp
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NexusApp:
    build:
      targets:
        NexusCore: all
        NexusApp: all
    run:
      config: Debug
      launchAutomaticallySubstyle: 2
    test:
      config: Debug
      targets:
        - name: NexusAppTests
          parallelizable: false
        - name: NexusUITests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
