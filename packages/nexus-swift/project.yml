name: NexusApp

options:
  bundleIdPrefix: com.nexus
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: strict
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_TESTABILITY: YES
    MTL_ENABLE_DEBUG_INFO: NO
    # Skip Metal shader compilation (not used in this app)
    GCC_WARN_INHIBIT_ALL_WARNINGS: NO
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES

targets:

  # ── NexusCore static library ──────────────────────────────────────────────
  NexusCore:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/NexusCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexus.NexusCore

  # ── NexusApp application ─────────────────────────────────────────────────
  NexusApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/NexusApp
    postCompileScripts:
      - name: Copy nexus-daemon to bundle Resources
        inputFiles:
          - $(SRCROOT)/Resources/nexus-daemon
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/nexus-daemon
        script: |
          DAEMON_SRC="${SRCROOT}/Resources/nexus-daemon"
          DAEMON_DST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/nexus-daemon"
          if [ -f "$DAEMON_SRC" ]; then
            mkdir -p "$(dirname "$DAEMON_DST")"
            cp "$DAEMON_SRC" "$DAEMON_DST"
            chmod +x "$DAEMON_DST"
          else
            echo "warning: nexus-daemon not found at ${DAEMON_SRC}; run 'task swift:bundle-daemon' first"
          fi
    dependencies:
      - target: NexusCore
        link: true
      - package: SwiftTerm
        product: SwiftTerm
    info:
      path: Sources/NexusApp/Info.plist
      properties:
        CFBundleDisplayName: Nexus
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexus.NexusApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES

  # ── NexusAppTests (unit / integration) ───────────────────────────────────
  NexusAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/NexusAppTests
    dependencies:
      - target: NexusCore
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexus.NexusAppTests
        GENERATE_INFOPLIST_FILE: YES

  # ── NexusUITests (XCUITest — use Xcode's Record button) ──────────────────
  NexusUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/NexusUITests
    dependencies:
      - target: NexusApp
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexus.NexusUITests
        TEST_TARGET_NAME: NexusApp
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NexusApp:
    build:
      targets:
        NexusCore: all
        NexusApp: all
    run:
      config: Debug
      launchAutomaticallySubstyle: 2
    test:
      config: Debug
      targets:
        - name: NexusAppTests
          parallelizable: false
        - name: NexusUITests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
