name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [created]

jobs:
  test:
    name: Run CI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Run CI pipeline
        run: task ci
        env:
          CI: true

  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            short_sha="${GITHUB_SHA::7}"
            echo "version=0.0.0-main.${GITHUB_RUN_NUMBER}+${short_sha}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build for ${{ matrix.os }}
    needs: [test, version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact: nexus-linux-amd64
          - os: ubuntu-latest
            target: linux-arm64
            artifact: nexus-linux-arm64
          - os: macos-latest
            target: darwin-amd64
            artifact: nexus-darwin-amd64
          - os: macos-latest
            target: darwin-arm64
            artifact: nexus-darwin-arm64
          - os: windows-latest
            target: windows-amd64
            artifact: nexus-windows-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        shell: bash
        working-directory: packages/nexus
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == windows* ]]; then
            GOOS=windows GOARCH=amd64 go build -o dist/${{ matrix.artifact }}.exe ./cmd/nexus
          else
            GOOS=$(echo ${{ matrix.target }} | cut -d'-' -f1) \
            GOARCH=$(echo ${{ matrix.target }} | cut -d'-' -f2) \
            go build -o dist/${{ matrix.artifact }} ./cmd/nexus
          fi

      - name: Package binary
        shell: bash
        working-directory: packages/nexus
        run: |
          mkdir -p release
          version="${{ needs.version.outputs.version }}"
          archive="nexus-${version}-${{ matrix.target }}.tar.gz"
          if [[ "${{ matrix.target }}" == windows* ]]; then
            tar -C dist -czf "release/${archive}" "${{ matrix.artifact }}.exe"
          else
            tar -C dist -czf "release/${archive}" "${{ matrix.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/nexus/release/*

  publish-main-artifacts:
    name: Publish Main Build Artifacts
    if: github.ref == 'refs/heads/main'
    needs: [build, version]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload consolidated main artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-main-build-${{ needs.version.outputs.version }}
          path: artifacts/*

  release:
    name: Create Release
    needs: [build, version]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: Nexus v${{ needs.version.outputs.version }}
          tag_name: v${{ needs.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
