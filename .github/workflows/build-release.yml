name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  semantic-release:
    name: Semantic Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          output=$(pnpm exec semantic-release --json)
          echo "$output"
          if echo "$output" | jq -e '.nextRelease.version' >/dev/null; then
            version=$(echo "$output" | jq -r '.nextRelease.version')
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Run CI Tests
    if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && needs.semantic-release.outputs.released == 'true')
    needs: [semantic-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag != '' && needs.semantic-release.outputs.tag || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Run CI pipeline
        run: task ci
        env:
          CI: true

  build:
    name: Build for ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && needs.semantic-release.outputs.released == 'true')
    needs: [semantic-release, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact: nexus-linux-amd64
          - os: ubuntu-latest
            target: linux-arm64
            artifact: nexus-linux-arm64
          - os: macos-latest
            target: darwin-amd64
            artifact: nexus-darwin-amd64
          - os: macos-latest
            target: darwin-arm64
            artifact: nexus-darwin-arm64
          - os: windows-latest
            target: windows-amd64
            artifact: nexus-windows-amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag != '' && needs.semantic-release.outputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        shell: bash
        working-directory: packages/nexus
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == windows* ]]; then
            GOOS=windows GOARCH=amd64 go build -o dist/${{ matrix.artifact }}.exe ./cmd/nexus
          else
            GOOS=$(echo ${{ matrix.target }} | cut -d'-' -f1) \
            GOARCH=$(echo ${{ matrix.target }} | cut -d'-' -f2) \
            go build -o dist/${{ matrix.artifact }} ./cmd/nexus
          fi

      - name: Package binary
        shell: bash
        working-directory: packages/nexus
        run: |
          mkdir -p release
          if [[ -n "${{ needs.semantic-release.outputs.version }}" ]]; then
            version="${{ needs.semantic-release.outputs.version }}"
          else
            version="${GITHUB_REF#refs/tags/v}"
          fi
          archive="nexus-${version}-${{ matrix.target }}.tar.gz"
          if [[ "${{ matrix.target }}" == windows* ]]; then
            tar -C dist -czf "release/${archive}" "${{ matrix.artifact }}.exe"
          else
            tar -C dist -czf "release/${archive}" "${{ matrix.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/nexus/release/*

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && needs.semantic-release.outputs.released == 'true')
    needs: [semantic-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: Nexus v${{ needs.semantic-release.outputs.version != '' && needs.semantic-release.outputs.version || github.ref_name }}
          tag_name: ${{ needs.semantic-release.outputs.tag != '' && needs.semantic-release.outputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
